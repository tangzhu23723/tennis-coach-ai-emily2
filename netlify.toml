[build]
  command = "cd tennis-coach-ai && npm install && rm -rf dist && npx expo export --platform web && node -e \"const fs=require('fs');const p='dist/index.html';let h=fs.readFileSync(p,'utf8');const ts=Date.now();h=h.replace('</head>','<meta http-equiv=\\\"Cache-Control\\\" content=\\\"no-cache, no-store, must-revalidate\\\"><meta http-equiv=\\\"Pragma\\\" content=\\\"no-cache\\\"><meta http-equiv=\\\"Expires\\\" content=\\\"0\\\"><meta name=\\\"build-time\\\" content=\\\"'+ ts +'\\\"><meta name=\\\"app-version\\\" content=\\\"v2.3.0-'+ ts +'\\\"></head>');fs.writeFileSync(p,h,'utf8');console.log('Cache-busting meta injected, build:',ts);\""
  publish = "tennis-coach-ai/dist"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"

[[headers]]
  for = "/_expo/static/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_expo/static/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"



