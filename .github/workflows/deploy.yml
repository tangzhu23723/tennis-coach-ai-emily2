name: Deploy to Tencent CloudBase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Expo dependencies
        run: |
          cd tennis-coach-ai
          npm ci

      - name: Build Expo Web
        run: |
          cd tennis-coach-ai
          npx expo export --platform web

      - name: Inject build timestamp (cache-busting)
        run: |
          $ts = (Date -Format "yyyyMMdd-HHmmss")
          $html = "tennis-coach-ai/dist/index.html"
          $content = Get-Content $html -Raw
          $content = $content -replace '</head>', "<meta name=`"app-version`" content=`"v2.8.0-$ts`"></head>"
          Set-Content -Path $html -Value $content -NoNewline
          echo "Build timestamp: $ts"

      - name: Deploy to CloudBase Static Hosting
        uses: TencentCloudBase/cloudbase-action@v2
        with:
          secretId: ${{ secrets.TC_SECRET_ID }}
          secretKey: ${{ secrets.TC_SECRET_KEY }}
          envId: ${{ secrets.TC_ENV_ID }}
          staticSrcPath: tennis-coach-ai/dist

