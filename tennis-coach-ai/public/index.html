<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TennisCoach AI - 网球视频智能分析</title>
  <meta name="description" content="AI 智能分析网球击球动作，提供五维评分和改进建议">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; width: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a1f15; color: #fff; }
    #root { display: flex; align-items: center; justify-content: center; }
    .app-loading { text-align: center; }
    .app-loading-icon { font-size: 64px; margin-bottom: 16px; animation: bounce 1.5s infinite; }
    .app-loading-text { font-size: 16px; color: #9ca3af; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="app-loading">
      <div class="app-loading-icon">🎾</div>
      <div class="app-loading-text">加载 TennisCoach AI...</div>
    </div>
  </div>
  <!-- Expo will auto-inject scripts here -->
</body>
</html>
